<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>

    <body>
        <div id="app"></div>
        <script>

            let html = "";
            const app = document.getElementById("app");   
            
            function updateView (){
                
                html = viewStartPage();
                app.innerHTML = html;
            }


            
            
            function viewStartPage()
            {
                return /*HTML*/ `
                    <select>
                        <option>Bergen</option>
                        <option>Budapest</option>
                    </select>
                `;
            }

            updateView ();
        </script>
    </body>
</html>
