<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <script src="model.js"></script>

        <style>
            #app
            {
                background-color: #775;
            }
            .cssCityList
            {
                background-color: #ccc;
                border: 1px solid rgb(112, 112, 112);       /* thin border so rounding is visible */
                border-radius: 6px;           /* slight rounding; use e.g. 4px–10px */
                padding: 6px 8px;             /* spacing inside the select */
                font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 16px;              /* adjust as desired */
                appearance: none;             /* optional: remove native dropdown arrow styling (may vary by browser) */
            }

            .headerSearch
            {
                font-style: italic;
                font-family: "Bebas Neue", sans-serif;
            }

            .buttonSearch
            {
                background-color: #c0e763;
                border: 1px solid rgb(112, 112, 112);       /* thin border so rounding is visible */
                border-radius: 6px;           /* slight rounding; use e.g. 4px–10px */
                padding: 6px 12px;             /* spacing inside the select */
                font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 16px;              /* adjust as desired */
            }

            .imgCity
            {
                width: 160px;
                height: 160px;
                object-fit: cover; /* cover, contain, or fill depending on desired crop behavior */
                border-radius: 6px; /* optional to match other elements */
                display:block;
                margin-top: 24px;   /* space above the image */
                margin-left: 0;     /* optional: adjust horizontal spacing */
                margin-bottom: 0;   /* optional */
            }

            /* Isak */
            /* Column container */
            .container 
            {  
                display: flex;
                flex-wrap: wrap;
            }

            /* Sidebar/left column */
            .side 
            {
                flex: 0 0 33.33%;        /* fixed one-third column */
                box-sizing: border-box;  /* include padding in width */
                background-color: #f1f1f1;
                padding: 20px;
                border: 1px solid #ccc;  /* visible border to delineate the section */
                border-radius: 8px;      /* slight rounding */
                margin: 12px;            /* spacing from the page edges and neighbors */
                min-width: 220px;        /* prevents it collapsing too small on narrow screens */            
            }

        </style>
    </head>

    <body>
        <div id="app"></div>
        <script>

            let html = "";
            const app = document.getElementById("app");   
            
            function updateView ()
            {
                
                html = viewStartPage();
                app.innerHTML = html;
            }

            function addCityList()
            {
                let tempString = /*HTML*/ `
                    <div class="container">
                        <div class="side">
                            <h2 class="headerSearch">Hvor vil du søke?</h2>
                            <select class="cssCityList">
                `;
                for (let c = 0; c < model.data.cities.length; c++)
                {
                    tempString += `<option>${model.data.cities[c].name}</option>`;
                }
                tempString += /*HTML*/ `
                            </select>
                            <button class="buttonSearch">Søk</button>
                            <img class="imgCity" src="https://media.istockphoto.com/id/586924460/vector/city-map-with-various-buildings.jpg?s=170667a&w=0&k=20&c=byybSCRNdSffgm4i8PRjUV4rrz6NgKkK8J8otiXRgqc=">
                        </div>
                    </div>
                `;
                return tempString;
            }

            function addNewestReviews()
            {
                let stores = model.data.store;
                let all = [];       // temp array to store newest reviews across stores

                for (let i = 0; i < stores.length; i++)
                {
                    let reviews = stores[i].reviews;
                    if (Array.isArray(reviews))
                    {
                        for (var j = 0; j < reviews.length; j++)
                        {
                            all.push(reviews[j]);
                        }
                    }
                }

                // sort combined list newest-first
                all.sort(
                    function(a, b)
                    {
                        return new Date(b.date) - new Date(a.date);
                    }
                );

                let returnString = "";
                for (let r = 0; r < all.length; r++)
                {
                    returnString += "<div>" + all[r].date + "</div>";
                }
                return returnString;
            }


            function viewStartPage()
            {
                let main = "<div class='cssMain'>";
                let cityList = addCityList();
                let newestReviews = addNewestReviews();
                return cityList + newestReviews;
            }

            updateView ();
        </script>
    </body>
</html>
